}

.band-title{
font-size:13px;
letter-spacing:.08em;
text-transform:uppercase;
color:#6c737a;
font-weight:600;
margin-bottom:4px;
}

.subtle{
color:#6c737a;
font-size:16px;
}

h1{

font-size:56px;
line-height:1.05;

margin-bottom:18px;
